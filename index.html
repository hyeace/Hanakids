<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>예꼬 칭찬스티커&큐티상</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Noto Sans KR', sans-serif;
    background: linear-gradient(135deg, #4a1a8c 0%, #6b2fa0 40%, #8b3fc0 100%);
    min-height: 100vh;
    color: #1a1a1a;
  }

  .app-wrap { max-width: 640px; margin: 0 auto; padding: 1.5rem 1rem 4rem; }

  .app-header {
    text-align: center; padding: 2.5rem 1rem 2rem;
    margin-bottom: 1.5rem;
    border-bottom: 2px solid rgba(255,255,255,0.25);
  }
  .app-header .star-row { font-size: 33px; letter-spacing: 8px; margin-bottom: 12px; color: #f9d84a; }
  .app-header h1 { font-size: 36px; font-weight: 700; color: #fff; line-height: 1.3; text-shadow: 0 2px 8px rgba(0,0,0,0.2); }
  .app-header p { font-size: 21px; color: rgba(255,255,255,0.8); margin-top: 8px; }

  .section-label {
    font-size: 17px; font-weight: 700; color: rgba(255,255,255,0.95);
    letter-spacing: 0.06em; margin-bottom: 12px;
  }

  .panel {
    background: rgba(255,255,255,0.97);
    border-radius: 18px;
    padding: 1.5rem;
    margin-bottom: 1.2rem;
    box-shadow: 0 4px 24px rgba(0,0,0,0.18);
  }

  /* 반 선택 */
  .class-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); gap: 10px; }
  .class-btn {
    padding: 15px 8px; border-radius: 12px; border: 2px solid #d8b4fe;
    background: #faf5ff; cursor: pointer; font-size: 21px; font-weight: 500;
    color: #5b21b6; transition: all 0.15s; text-align: center; font-family: inherit;
  }
  .class-btn:hover { border-color: #7c3aed; background: #ede9fe; }
  .class-btn.active { border: 2.5px solid #7c3aed; background: #7c3aed; color: #fff; font-weight: 700; }

  /* 월 선택 */
  .month-row { display: flex; flex-wrap: wrap; gap: 8px; }
  .month-btn {
    padding: 8px 18px; border-radius: 24px; border: 2px solid #d8b4fe;
    background: #faf5ff; cursor: pointer; font-size: 20px; color: #5b21b6;
    transition: all 0.12s; font-family: inherit; font-weight: 500;
  }
  .month-btn:hover { border-color: #7c3aed; background: #ede9fe; }
  .month-btn.active { background: #7c3aed; border-color: #7c3aed; color: #fff; font-weight: 700; }

  /* 교사 배지 */
  .teacher-badge {
    display: inline-flex; align-items: center; gap: 7px;
    padding: 8px 18px; border-radius: 24px;
    background: #ede9fe; border: 2px solid #c4b5fd;
    font-size: 20px; color: #5b21b6; margin-bottom: 1rem; font-weight: 500;
  }

  /* 알림 */
  .notice {
    padding: 14px 16px; border-radius: 12px; border: 2px solid;
    font-size: 20px; margin-bottom: 1rem; line-height: 1.5;
    display: flex; align-items: flex-start; gap: 10px;
  }
  .notice.info { border-color: #93c5fd; background: #eff6ff; color: #1d4ed8; }
  .notice.success { border-color: #6ee7b7; background: #ecfdf5; color: #065f46; }
  .notice.error { border-color: #fca5a5; background: #fef2f2; color: #991b1b; }
  .notice svg { flex-shrink: 0; margin-top: 2px; }

  /* 학생 테이블 */
  .student-table-wrap {
    border: 2px solid #d8b4fe; border-radius: 14px;
    overflow: hidden; margin-bottom: 1.5rem; background: #fff;
  }
  .student-table { width: 100%; border-collapse: collapse; }
  .student-table th {
    background: #7c3aed; padding: 13px 16px; font-size: 19px; font-weight: 700;
    color: #fff; text-align: left; border-bottom: 2px solid #6d28d9;
  }
  .student-table th.center { text-align: center; }
  .student-table td { padding: 12px 16px; border-bottom: 1px solid #ede9fe; vertical-align: middle; }
  .student-table tr:last-child td { border-bottom: none; }
  .student-table tr:nth-child(even) td { background: #faf5ff; }
  .student-table tr:hover td { background: #ede9fe; }
  .student-name { font-size: 22px; font-weight: 500; color: #1a1a1a; }

  /* 스티커 숫자 입력 */
  .sticker-input {
    width: 90px; padding: 9px 10px; border-radius: 10px;
    border: 2px solid #d8b4fe; background: #faf5ff;
    font-size: 22px; text-align: center; color: #1a1a1a;
    transition: border 0.12s; font-family: inherit;
  }
  .sticker-input:focus { outline: none; border: 2.5px solid #7c3aed; background: #ede9fe; }
  .sticker-input.error { border: 2.5px solid #ef4444; background: #fef2f2; }

  /* 큐티상 토글 */
  .cutie-wrap { display: flex; justify-content: center; }
  .cutie-toggle {
    display: flex; align-items: center; justify-content: center;
    width: 48px; height: 48px; border-radius: 50%;
    border: 2px solid #d8b4fe; background: #faf5ff;
    cursor: pointer; font-size: 26px; transition: all 0.15s;
    user-select: none;
  }
  .cutie-toggle:hover { border-color: #7c3aed; background: #ede9fe; }
  .cutie-toggle.on { background: #7c3aed; border-color: #6d28d9; transform: scale(1.15); }

  /* 저장 버튼 */
  .submit-btn {
    width: 100%; padding: 18px; border-radius: 14px; border: none;
    background: #7c3aed; color: #fff; font-size: 24px; font-weight: 700;
    cursor: pointer; transition: background 0.15s, transform 0.1s;
    display: flex; align-items: center; justify-content: center; gap: 10px;
    font-family: inherit; box-shadow: 0 4px 16px rgba(124,58,237,0.4);
  }
  .submit-btn:hover { background: #6d28d9; }
  .submit-btn:active { transform: scale(0.98); }
  .submit-btn:disabled { background: #c4b5fd; color: #fff; cursor: not-allowed; box-shadow: none; }

  .back-btn {
    display: block; text-align: center; margin-top: 14px;
    background: none; border: none; color: rgba(255,255,255,0.8); font-size: 20px;
    cursor: pointer; font-family: inherit;
  }
  .back-btn:hover { color: #fff; }

  @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
  .spin { animation: spin 0.8s linear infinite; display: inline-block; }

  @media (max-width: 480px) {
    .class-grid { grid-template-columns: repeat(3, 1fr); }
    .sticker-input { width: 76px; }
    .app-header h1 { font-size: 28px; }
  }
</style>
</head>
<body>
<div class="app-wrap">
  <div class="app-header">
    <div class="star-row">★ ★ ★</div>
    <h1>예꼬 칭찬스티커&큐티상</h1>
    <p>반을 선택하고 이번 달 기록을 입력해 주세요</p>
  </div>

  <!-- Step 1: 반 선택 -->
  <div id="step1">
    <div class="section-label">반 선택</div>
    <div class="panel">
      <div class="class-grid" id="classGrid"></div>
    </div>
  </div>

  <!-- Step 2: 입력 -->
  <div id="step2" style="display:none;">
    <div class="section-label" style="margin-bottom:10px;">월 선택</div>
    <div class="panel">
      <div class="month-row" id="monthRow"></div>
    </div>

    <div id="teacherBadge" class="teacher-badge">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/></svg>
      <span id="teacherName"></span>
    </div>

    <div id="noticeArea"></div>

    <div class="student-table-wrap">
      <table class="student-table">
        <thead>
          <tr>
            <th>학생 이름</th>
            <th class="center">칭찬스티커 갯수</th>
            <th class="center">큐티상</th>
          </tr>
        </thead>
        <tbody id="studentBody"></tbody>
      </table>
    </div>

    <button class="submit-btn" id="submitBtn" onclick="submitData()">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="16 16 12 12 8 16"/><line x1="12" y1="12" x2="12" y2="21"/><path d="M20.39 18.39A5 5 0 0 0 18 9h-1.26A8 8 0 1 0 3 16.3"/></svg>
      구글 시트에 저장하기
    </button>
    <button class="back-btn" onclick="resetToClassSelect()">← 반 다시 선택</button>
  </div>
</div>

<script>
const GAS_URL = "https://script.google.com/macros/s/AKfycbx62t29PZAkXV5cTScQEs9oYTl_iRHU4NP-Wl3j6OCEF9WZJWg4DbKTrR_mlRAQnuq-cg/exec";

const CLASSES = {
  "믿음1반": { teacher: "신희정", students: ["임수아","황이담","신윤성","김시우"] },
  "믿음2반": { teacher: "노필녀", students: ["윤지안","강예안","장온유"] },
  "소망1반": { teacher: "유초선", students: ["김다현","이봄","최주하","손우주"] },
  "소망2반": { teacher: "노연화", students: ["강온유","박채온","이태오","김아인","홍서안"] },
  "소망3반": { teacher: "손지희", students: ["윤하언","김하윤","김하랑","김선우"] },
  "소망4반": { teacher: "조솔지", students: ["임온유","신재인","김온봄","최재아","김준세"] },
  "사랑1반": { teacher: "이의성", students: ["유시현","김우림","윤소은"] },
  "사랑2반": { teacher: "김세련", students: ["강주안","유찬","김온유","홍윤열"] },
  "은혜1반": { teacher: "김성희", students: ["김찬중","박도준","강민재","임사랑","여하율","박연하","김미우"] },
  "은혜2반": { teacher: "이지혜", students: ["황이서","윤재온","임윤수","최재율","조이로","차희서","신시아"] }
};
const MONTHS = ["1월","2월","3월","4월","5월","6월","7월","8월","9월","10월","11월","12월"];

let selectedClass = null;
let selectedMonth = null;
const studentData = {};

function init() {
  const grid = document.getElementById("classGrid");
  Object.keys(CLASSES).forEach(cls => {
    const btn = document.createElement("button");
    btn.className = "class-btn";
    btn.textContent = cls;
    btn.onclick = () => selectClass(cls, btn);
    grid.appendChild(btn);
  });

  const monthRow = document.getElementById("monthRow");
  MONTHS.forEach(m => {
    const btn = document.createElement("button");
    btn.className = "month-btn";
    btn.textContent = m;
    btn.onclick = () => selectMonth(m, btn);
    monthRow.appendChild(btn);
  });

  const curMonth = new Date().getMonth();
  monthRow.querySelectorAll(".month-btn")[curMonth]?.click();
}

function selectClass(cls, btn) {
  document.querySelectorAll(".class-btn").forEach(b => b.classList.remove("active"));
  btn.classList.add("active");
  selectedClass = cls;
  document.getElementById("step2").style.display = "block";
  document.getElementById("teacherName").textContent = CLASSES[cls].teacher + " 선생님";
  renderStudents();
  document.getElementById("step2").scrollIntoView({ behavior: "smooth", block: "start" });
}

function selectMonth(m, btn) {
  document.querySelectorAll(".month-btn").forEach(b => b.classList.remove("active"));
  btn.classList.add("active");
  selectedMonth = m;
  if (selectedClass) renderStudents();
}

function getKey() { return selectedClass + "_" + selectedMonth; }

function renderStudents() {
  if (!selectedClass || !selectedMonth) return;
  const cls = CLASSES[selectedClass];
  const key = getKey();
  if (!studentData[key]) studentData[key] = {};

  const tbody = document.getElementById("studentBody");
  tbody.innerHTML = "";

  cls.students.forEach(name => {
    if (!studentData[key][name]) studentData[key][name] = { sticker: "0", cutie: false };
    const d = studentData[key][name];

    const tr = document.createElement("tr");
    tr.innerHTML = `
      <td><span class="student-name">${name}</span></td>
      <td style="text-align:center;">
        <input class="sticker-input" type="number" min="0" max="99" placeholder="0"
          id="sticker_${name}" value="${d.sticker}"
          oninput="updateSticker('${name}', this.value)"
          onblur="validateSticker('${name}', this)">
      </td>
      <td>
        <div class="cutie-wrap">
          <button class="cutie-toggle ${d.cutie ? 'on' : ''}" onclick="toggleCutie('${name}')" id="cutie_${name}" title="큐티상 ${d.cutie ? '받음' : '미수여'}">
            ${d.cutie ? '🌟' : '☆'}
          </button>
        </div>
      </td>`;
    tbody.appendChild(tr);
  });

  document.getElementById("noticeArea").innerHTML = `
    <div class="notice info">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
      <span><strong>${selectedClass} ${selectedMonth}</strong> 데이터를 입력해 주세요. 칭찬스티커 갯수는 반드시 입력해야 합니다.</span>
    </div>`;
}

function updateSticker(name, val) {
  const key = getKey();
  if (!studentData[key][name]) studentData[key][name] = { sticker: "0", cutie: false };
  studentData[key][name].sticker = val;
  document.getElementById("sticker_" + name)?.classList.remove("error");
}

function validateSticker(name, el) {
  el.classList.remove("error");
}

function toggleCutie(name) {
  const key = getKey();
  studentData[key][name].cutie = !studentData[key][name].cutie;
  const btn = document.getElementById("cutie_" + name);
  btn.classList.toggle("on");
  btn.textContent = studentData[key][name].cutie ? "🌟" : "☆";
  btn.title = "큐티상 " + (studentData[key][name].cutie ? "받음" : "미수여");
}

function resetToClassSelect() {
  selectedClass = null;
  document.querySelectorAll(".class-btn").forEach(b => b.classList.remove("active"));
  document.getElementById("step2").style.display = "none";
  window.scrollTo({ top: 0, behavior: "smooth" });
}

function submitData() {
  if (!selectedClass || !selectedMonth) return;
  const key = getKey();
  const data = studentData[key] || {};
  const cls = CLASSES[selectedClass];
  const rows = cls.students.map(name => {
    const el = document.getElementById("sticker_" + name);
    const stickerVal = el && el.value !== "" ? Number(el.value) : Number(data[name]?.sticker ?? 0);
    return {
      name,
      sticker: stickerVal,
      cutie: data[name]?.cutie ?? false
    };
  });

  const btn = document.getElementById("submitBtn");
  btn.disabled = true;
  btn.innerHTML = '<span class="spin">↻</span> 저장 중...';

  const params = new URLSearchParams({
    className: selectedClass,
    teacher: cls.teacher,
    month: selectedMonth,
    rows: JSON.stringify(rows)
  });

  fetch(GAS_URL + "?" + params.toString(), { method: "GET" })
  .then(r => r.json())
  .then(result => {
    if (result.status === "ok") {
      document.getElementById("noticeArea").innerHTML = `
        <div class="notice success">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg>
          <span><strong>${selectedClass} ${selectedMonth}</strong> 데이터가 구글 시트에 저장되었습니다! ✨</span>
        </div>`;
    } else { throw new Error(result.message || "저장 실패"); }
  })
  .catch(e => {
    document.getElementById("noticeArea").innerHTML = `
      <div class="notice error">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
        <span>저장 중 오류가 발생했습니다: ${e.message}</span>
      </div>`;
  })
  .finally(() => {
    btn.disabled = false;
    btn.innerHTML = '<svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="16 16 12 12 8 16"/><line x1="12" y1="12" x2="12" y2="21"/><path d="M20.39 18.39A5 5 0 0 0 18 9h-1.26A8 8 0 1 0 3 16.3"/></svg> 구글 시트에 저장하기';
  });
}

init();
</script>
</body>
</html>
